version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: job_platform_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d job_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: job_platform_api
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/job_platform
      - JWT_SECRET_KEY=949f57fbe13645b2b2a63d9a562473491ba6fb3bf39d1b09b5523a5de033f20a
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - LOG_LEVEL=DEBUG
      - RATE_LIMIT_TOKENS_PER_MINUTE=100
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: job_platform_worker
    command: python -m backend.worker.main
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/job_platform
      - JWT_SECRET_KEY=949f57fbe13645b2b2a63d9a562473491ba6fb3bf39d1b09b5523a5de033f20a
      - JWT_ALGORITHM=HS256
      - LOG_LEVEL=DEBUG
      - WORKER_POLL_INTERVAL_SECONDS=1
      - WORKER_HEARTBEAT_INTERVAL_SECONDS=5
      - REAP_THRESHOLD_SECONDS=15
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: job_platform_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
